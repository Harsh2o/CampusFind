{% extends 'base.html' %}

{% block title %}Report Lost Item - CampusFind{% endblock %}

{% block head %}
<style>
  .report-container {
    max-width: 800px;
    margin: 40px auto;
    padding: 30px;
    background-color: white;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  }

  .report-header {
    margin-bottom: 30px;
  }

  .report-header h2 {
    color: var(--primary);
    margin-bottom: 10px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .form-control {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1rem;
  }

  .form-control:focus {
    outline: none;
    border-color: var(--primary);
  }

  textarea.form-control {
    min-height: 100px;
    resize: vertical;
  }
</style>
{% endblock %}

{% block content %}
<div class="report-container">
  <div class="report-header">
    <h2>Report a Lost Item</h2>
    <p>Please provide as much detail as possible to help us locate your item.</p>
  </div>

  <form method="POST" action="{{ url_for('report_lost') }}" enctype="multipart/form-data">
    <div class="form-group">
      <label for="item-name">Item Name</label>
      <input
        type="text"
        id="item-name"
        name="item-name"
        class="form-control"
        placeholder="e.g. Blue Backpack"
        required
      />
    </div>
    
    <div class="form-group">
      <label for="item-category">Category</label>
      <select id="item-category" name="item-category" class="form-control" required>
        <option value="">Select a category</option>
        <option value="electronics">Electronics</option>
        <option value="clothing">Clothing</option>
        <option value="accessories">Accessories</option>
        <option value="books">Books & Notes</option>
        <option value="keys">Keys</option>
        <option value="id-cards">ID Cards</option>
        <option value="other">Other</option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="lost-date">When did you lose it?</label>
      <input type="date" id="lost-date" name="lost-date" class="form-control" required />
    </div>
    
    <div class="form-group">
      <label for="lost-location">Where did you last see it?</label>
      <input
        type="text"
        id="lost-location"
        name="lost-location"
        class="form-control"
        placeholder="e.g. Library, 2nd floor"
        required
      />
    </div>
    
    <div class="form-group">
      <label for="item-description">Description</label>
      <textarea
        id="item-description"
        name="item-description"
        class="form-control"
        rows="4"
        placeholder="Describe your item in detail including any identifying features"
        required
      ></textarea>
    </div>
    
    <div class="form-group">
      <label for="item-photo">Upload Photo (optional)</label>
      <input
        type="file"
        id="item-photo"
        name="item-photo"
        class="form-control"
        accept="image/*"
      />
    </div>
    
    <div class="form-group">
      <label for="contact-info">Contact Information</label>
      <input
        type="email"
        id="contact-info"
        name="contact-info"
        class="form-control"
        placeholder="Your email address"
        required
      />
    </div>
    
    <button type="submit" class="btn btn-primary">Submit Report</button>
  </form>
</div>
{% endblock %}
